jwt:
  secret: simple-oms-jwt-secret-key-2026-min-256-bit-long!!
  access-expiration-ms: 900000
  refresh-expiration-ms: 604800000

server:
  port: 8080

spring:
  application:
    name: simple-oms
  datasource:
    url: jdbc:h2:mem:simpleoms
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  data:
    redis:
      host: localhost
      port: 6379
  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.joycai.simpleoms: DEBUG
