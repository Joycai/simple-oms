webauthn:
  rp-id: localhost
  rp-name: simple-oms
  origin: http://localhost:3200

cors:
  allowed-origins: http://localhost:3200

jwt:
  access-expiration-ms: 900000
  refresh-expiration-ms: 604800000

server:
  port: 8080

spring:
  application:
    name: simple-oms
  datasource:
    url: jdbc:postgresql://localhost:5432/simple_oms
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379
  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.joycai.simpleoms: DEBUG
